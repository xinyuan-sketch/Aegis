{% extends "base.html" %}
{% block title %}Hash 查询 · Aegis{% endblock %}
{% block content %}
<div class="topbar">
  <div class="page-head"><h1>Hash 查询</h1></div>
  <div style="color:var(--muted);font-size:13px">MD5 / SHA1 / SHA256　单次新查询消耗 <b style="color:var(--c-blue)">{{ cost }}</b> 积分（缓存命中免费）</div>
</div>

<div class="panel" style="margin-top:0">
  <label class="card-label">Hash 列表（换行或逗号分隔，单次最多 200）</label>
  <textarea id="hashes" rows="6" placeholder="e10adc3949ba59abbe56e057f20f883e&#10;5f4dcc3b5aa765d61d8327deb882cf99" style="font-family:ui-monospace,monospace"></textarea>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button id="btn-lookup">查询</button>
    <button id="btn-export" class="ghost" disabled>导出 CSV</button>
  </div>
  <div id="msg" style="margin-top:12px"></div>
</div>

<div class="panel hidden" id="result-panel">
  <div class="panel-head"><h3>结果 <span id="result-meta" style="color:var(--dim);font-size:12px"></span></h3></div>
  <div style="overflow:auto;max-height:520px">
    <table class="data-table">
      <thead><tr><th>Hash</th><th>算法</th><th>状态</th><th>明文</th></tr></thead>
      <tbody id="result-body"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<style>.hidden{display:none!important}</style>
<script>
const el = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function runLookup() {
  const hashes = el('hashes').value.trim();
  if (!hashes) { el('msg').innerHTML = '<div class="flash flash-error">请输入 hash</div>'; return; }
  el('msg').innerHTML = '<span style="color:var(--muted)">查询中…</span>';
  el('btn-lookup').disabled = true;
  try {
    const r = await fetch("{{ url_for('hash.lookup') }}", {method:'POST', body:new URLSearchParams({hashes})});
    const d = await r.json();
    if (d.error) { el('msg').innerHTML = `<div class="flash flash-error">${d.error}</div>`; return; }
    const warn = d.online_error ? `<div class="flash flash-error" style="margin-top:8px">在线查库：${d.online_error}</div>` : '';
    el('msg').innerHTML = `<div class="flash flash-ok">共 ${d.total} 条，命中 ${d.found} 条${d.cost?'，消耗 '+d.cost+' 积分（仅按成功破解计费）':'（未产生消耗）'}</div>` + warn;
    el('result-panel').classList.remove('hidden');
    el('result-meta').textContent = `命中 ${d.found} / ${d.total}`;
    el('result-body').innerHTML = d.rows.map(x => `<tr>
      <td class="detail">${esc(x.hash)}</td>
      <td><span class="badge badge-info">${esc(x.algo)}</span></td>
      <td>${x.found ? '<span class="badge badge-on">已破解</span>' : '<span class="badge badge-off">未命中</span>'}</td>
      <td style="color:${x.found?'var(--c-green)':'var(--dim)'}">${x.plaintext ? esc(x.plaintext) : '—'}</td></tr>`).join('');
    el('btn-export').disabled = false;
  } catch (e) { el('msg').innerHTML = '<div class="flash flash-error">请求异常</div>'; }
  finally { el('btn-lookup').disabled = false; }
}

function exportCsv() {
  const f = document.createElement('form');
  f.method = 'POST'; f.action = "{{ url_for('hash.export_csv') }}";
  const i = document.createElement('input'); i.name = 'hashes'; i.value = el('hashes').value; f.appendChild(i);
  document.body.appendChild(f); f.submit(); f.remove();
}

el('btn-lookup').addEventListener('click', runLookup);
el('btn-export').addEventListener('click', exportCsv);
</script>
{% endblock %}
