{% extends "base.html" %}
{% block title %}{{ '编辑' if note else '新建' }}笔记 · {{ site_name or 'Aegis' }}{% endblock %}
{% block content %}
<div class="topbar">
  <div class="page-head"><h1>{{ '编辑笔记' if note else '新建笔记' }}</h1></div>
  <a href="{{ url_for('notes.index') }}" class="stat-sub">← 返回列表</a>
</div>

<form method="post" class="panel" action="{{ url_for('notes.edit', note_id=note.id) if note else url_for('notes.new') }}">
  <label class="card-label">标题</label>
  <input name="title" value="{{ note.title if note else '' }}" placeholder="笔记标题" required>

  <label class="card-label" style="margin-top:12px">内容（支持 Markdown）</label>
  <textarea name="body" rows="16" placeholder="# 标题&#10;支持 **粗体**、`代码`、- 列表、[链接](https://...) 等" style="font-family:ui-monospace,monospace;font-size:13px">{{ note.body if note else '' }}</textarea>

  <div class="grid grid-2" style="margin-top:12px">
    <div>
      <label class="card-label">标签（逗号分隔）</label>
      <input name="tags" value="{{ note.tags if note else '' }}" placeholder="如：内网, 提权, 备忘">
    </div>
    <div>
      <label class="card-label">可见性</label>
      <select name="visibility">
        <option value="private" {{ 'selected' if not note or note.visibility == 'private' }}>私密（仅自己）</option>
        <option value="public" {{ 'selected' if note and note.visibility == 'public' }}>团队共享（所有人可见）</option>
      </select>
    </div>
  </div>

  <label class="trust" style="color:var(--muted);margin-top:12px"><input type="checkbox" name="pinned" {{ 'checked' if note and note.pinned }}> 置顶</label>

  <div style="display:flex;gap:10px;margin-top:16px">
    <button type="submit">保存</button>
    {% if note %}<a class="btn ghost" href="{{ url_for('notes.view', note_id=note.id) }}">取消</a>{% endif %}
  </div>
</form>
{% endblock %}
