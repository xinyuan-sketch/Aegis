# Aegis Nginx 反向代理示例。TLS 证书请自行配置（如 certbot）。
server {
    listen 443 ssl;
    server_name aegis.example.com;

    ssl_certificate     /etc/letsencrypt/live/aegis.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aegis.example.com/privkey.pem;

    client_max_body_size 20m;

    # 静态资源直接由 Nginx 提供
    location /static/ {
        alias /opt/aegis/app/static/;
        expires 7d;
    }

    # 云浏览器 WebSocket 透传（云浏览器模块上线后启用）
    # location /vnc {
    #     proxy_pass http://127.0.0.1:6080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name aegis.example.com;
    return 301 https://$host$request_uri;
}
